name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    name: Run tests before release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install the project
        run: uv sync --frozen --all-extras --dev

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PY_VERSION" ]; then
            echo "Tag v$TAG does not match pyproject.toml version $PY_VERSION"
            exit 1
          fi

      - name: Run Ruff (Linting)
        run: uv run ruff check src/ tests/

      - name: Run Mypy (Type Checking)
        run: uv run mypy src/ tests/

      - name: Run Bandit (SAST)
        run: uv run bandit -q -r src/

      - name: Run pip-audit (Dependency scan)
        run: uv run pip-audit

      - name: Run Tests
        run: uv run pytest

  build-and-publish:
    name: Build artifacts and publish
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/wgpl
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install the project
        run: uv sync --frozen --all-extras --dev

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PY_VERSION" ]; then
            echo "Tag v$TAG does not match pyproject.toml version $PY_VERSION"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Build Standalone Linux Binary
        run: |
          uv pip install "pyinstaller==6.14.1"
          uv run pyinstaller --onefile --name wgpl-linux-amd64 src/wgpl/cli.py
          sha256sum dist/wgpl-linux-amd64 > dist/SHA256SUMS

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/wgpl-linux-amd64
            dist/SHA256SUMS
