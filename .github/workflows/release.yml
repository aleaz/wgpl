name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    name: Run tests before release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run Ruff (Linting)
        run: uv run ruff check src/ tests/

      - name: Run Mypy (Type Checking)
        run: uv run mypy src/ tests/

      - name: Run Bandit (SAST)
        run: uv run bandit -q -r src/

      - name: Run pip-audit (Dependency scan)
        run: uv run pip-audit

      - name: Run Tests
        run: uv run pytest

  pypi-publish:
    name: Build and publish Python distribution to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/wgpl
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Build Standalone Linux Binary
        run: |
          uv pip install pyinstaller --system
          uv run pyinstaller --onefile --name wgpl-linux-amd64 src/wgpl/cli.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/wgpl-linux-amd64
