name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    name: Run tests before release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install the project
        run: uv sync --frozen --all-extras --dev

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PY_VERSION" ]; then
            echo "Tag v$TAG does not match pyproject.toml version $PY_VERSION"
            exit 1
          fi

      - name: Run Ruff (Linting)
        run: uv run ruff check src/ tests/

      - name: Run Mypy (Type Checking)
        run: uv run mypy src/ tests/

      - name: Run Bandit (SAST)
        run: uv run bandit -q -r src/

      - name: Run pip-audit (Dependency scan)
        run: uv run pip-audit

      - name: Run Tests
        run: uv run pytest

  build-and-github-release:
    name: Build binary and GitHub Release
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: wgpl-linux-amd64
            is_mac: false
          - os: macos-14
            binary_name: wgpl-macos-arm64
            is_mac: true
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install the project
        run: uv sync --frozen --all-extras --dev

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PY_VERSION" ]; then
            echo "Tag v$TAG does not match pyproject.toml version $PY_VERSION"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Build Standalone Binary
        run: |
          uv pip install "pyinstaller==6.14.1"
          mkdir -p release_assets
          
          if [ "${{ matrix.is_mac }}" == "true" ]; then
            uv run pyinstaller --onedir --name ${{ matrix.binary_name }} --collect-submodules wgpl --copy-metadata wgpl --paths src src/wgpl/__main__.py
            (
              cd dist
              tar -czf ../release_assets/${{ matrix.binary_name }}.tar.gz ${{ matrix.binary_name }}
            )
            # macOS usually uses shasum
            (cd release_assets && shasum -a 256 ${{ matrix.binary_name }}.tar.gz > ${{ matrix.binary_name }}.tar.gz.sha256)
            ./dist/${{ matrix.binary_name }}/${{ matrix.binary_name }} --version
            ./dist/${{ matrix.binary_name }}/${{ matrix.binary_name }} --help >/dev/null
          else
            uv run pyinstaller --onefile --name ${{ matrix.binary_name }} --collect-submodules wgpl --copy-metadata wgpl --paths src src/wgpl/__main__.py
            cp dist/${{ matrix.binary_name }} release_assets/
            (cd release_assets && sha256sum ${{ matrix.binary_name }} > ${{ matrix.binary_name }}.sha256)
            ./dist/${{ matrix.binary_name }} --version
            ./dist/${{ matrix.binary_name }} --help >/dev/null
          fi


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release_assets/*

  publish-pypi:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/wgpl
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install the project
        run: uv sync --frozen --all-extras --dev

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
